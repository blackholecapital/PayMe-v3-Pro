<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#f0f2f5"/>
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2f7df6" stroke-width="0.5" opacity="0.28"/>
    </pattern>
    <pattern id="gridLg" width="300" height="300" patternUnits="userSpaceOnUse">
      <path d="M 300 0 L 0 0 0 300" fill="none" stroke="#2f7df6" stroke-width="1" opacity="0.16"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#2f7df6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f0f2f5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#gridLg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
</svg>
